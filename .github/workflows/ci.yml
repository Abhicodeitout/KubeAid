name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"
  KUBEAID_AI_ADVISOR: "off"
  KUBEAID_AI_PROVIDER: ""

jobs:
  go-version-check:
    name: Go Version Check
    runs-on: ubuntu-latest
    env:
      KUBEAID_AI_ADVISOR: "off"
      KUBEAID_AI_PROVIDER: ""
    defaults:
      run:
        working-directory: kube-debugger
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: kube-debugger/go.mod
          cache: true
          cache-dependency-path: kube-debugger/go.sum

      - name: Verify Go version
        run: |
          go version
          go env GOVERSION

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: go-version-check
    env:
      KUBEAID_AI_ADVISOR: "off"
      KUBEAID_AI_PROVIDER: ""
    defaults:
      run:
        working-directory: kube-debugger
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: kube-debugger/go.mod
          cache: true
          cache-dependency-path: kube-debugger/go.sum

      - name: Build CLI
        run: make build VERSION=v1.2.0

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: go-version-check
    env:
      KUBEAID_AI_ADVISOR: "off"
      KUBEAID_AI_PROVIDER: ""
    defaults:
      run:
        working-directory: kube-debugger
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: kube-debugger/go.mod
          cache: true
          cache-dependency-path: kube-debugger/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./... --timeout=5m

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: go-version-check
    env:
      KUBEAID_AI_ADVISOR: "off"
      KUBEAID_AI_PROVIDER: ""
    defaults:
      run:
        working-directory: kube-debugger
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: kube-debugger/go.mod
          cache: true
          cache-dependency-path: kube-debugger/go.sum

      - name: Run unit tests
        run: go test ./...

  smoke-tests:
    name: Smoke Tests (No Cluster)
    runs-on: ubuntu-latest
    needs: build
    env:
      KUBEAID_AI_ADVISOR: "off"
      KUBEAID_AI_PROVIDER: ""
    defaults:
      run:
        working-directory: kube-debugger
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: kube-debugger/go.mod
          cache: true
          cache-dependency-path: kube-debugger/go.sum

      - name: Build CLI
        run: make build VERSION=v1.2.0

      - name: Smoke command tree
        run: |
          ./kube-debugger --help >/dev/null
          ./kube-debugger help >/dev/null
          ./kube-debugger version >/dev/null
          ./kube-debugger history --help >/dev/null
          ./kube-debugger crashloops --help >/dev/null
          ./kube-debugger tui --help >/dev/null
          ./kube-debugger context --help >/dev/null
          ./kube-debugger report --help >/dev/null
          ./kube-debugger analyze --help >/dev/null
          ./kube-debugger completion bash >/dev/null
          ./kube-debugger completion zsh >/dev/null
          ./kube-debugger completion fish >/dev/null
          ./kube-debugger completion powershell >/dev/null
          ./kube-debugger bootstrap --skip-kubeconfig-check >/dev/null

      - name: Smoke no-pod behavior and exit codes
        run: |
          set +e
          ./kube-debugger analyze demo-app -n default >/tmp/analyze.out 2>/tmp/analyze.err
          rc=$?
          test "$rc" -eq 1
          ./kube-debugger analyze demo-app --exit-code --threshold 1 >/tmp/analyze2.out 2>/tmp/analyze2.err
          rc=$?
          test "$rc" -eq 1
          ./kube-debugger report demo-app -n default -f json >/tmp/report.out 2>/tmp/report.err
          rc=$?
          test "$rc" -eq 1
          set -e

  integration-tests:
    name: Integration Tests (kind)
    runs-on: ubuntu-latest
    needs: build
    env:
      KUBEAID_AI_ADVISOR: "off"
      KUBEAID_AI_PROVIDER: ""
    defaults:
      run:
        working-directory: kube-debugger
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: kube-debugger/go.mod
          cache: true
          cache-dependency-path: kube-debugger/go.sum

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0

      - name: Build CLI
        run: make build VERSION=v1.2.0

      - name: Deploy healthy and failing workloads
        run: |
          kubectl create deployment nginx-app --image=nginx:alpine --replicas=2
          kubectl label deployment nginx-app app=nginx-app --overwrite

          kubectl create deployment crash-api --image=busybox:1.36
          kubectl label deployment crash-api app=crash-api --overwrite
          kubectl patch deployment crash-api --type='json' -p='[{"op":"add","path":"/spec/template/spec/containers/0/command","value":["sh","-c","echo crash; exit 1"]}]'

          kubectl rollout status deployment/nginx-app --timeout=120s
          kubectl rollout status deployment/crash-api --timeout=120s || true
          kubectl get pods -n default

      - name: Integration - analyze/report/crashloops/history
        run: |
          ./kube-debugger analyze nginx-app -n default >/tmp/a1.out 2>/tmp/a1.err
          ./kube-debugger report nginx-app -n default -f json >/tmp/r1.out 2>/tmp/r1.err

          set +e
          ./kube-debugger analyze crash-api -n default --exit-code --threshold 80 >/tmp/a2.out 2>/tmp/a2.err
          rc=$?
          set -e
          test "$rc" -eq 2

          ./kube-debugger crashloops -n default >/tmp/c1.out 2>/tmp/c1.err
          ./kube-debugger history nginx-app -n default >/tmp/h1.out 2>/tmp/h1.err

  all-tests:
    name: All Tests Gate
    runs-on: ubuntu-latest
    if: always()
    env:
      KUBEAID_AI_ADVISOR: "off"
      KUBEAID_AI_PROVIDER: ""
    needs:
      - go-version-check
      - build
      - lint
      - unit-tests
      - smoke-tests
      - integration-tests
    steps:
      - name: Verify required jobs passed
        run: |
          echo "go-version-check: ${{ needs.go-version-check.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "lint: ${{ needs.lint.result }}"
          echo "unit-tests: ${{ needs.unit-tests.result }}"
          echo "smoke-tests: ${{ needs.smoke-tests.result }}"
          echo "integration-tests: ${{ needs.integration-tests.result }}"

          test "${{ needs.go-version-check.result }}" = "success"
          test "${{ needs.build.result }}" = "success"
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.unit-tests.result }}" = "success"
          test "${{ needs.smoke-tests.result }}" = "success"
          test "${{ needs.integration-tests.result }}" = "success"
